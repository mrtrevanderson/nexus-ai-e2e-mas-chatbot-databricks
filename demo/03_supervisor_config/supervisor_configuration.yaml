  - ErgoPro Marketing Copy Agent         # Genie Space
  - ErgoPro Customer Support Agent       # Genie Space
  - ErgoPro Order Fulfillment Agent      # Genie Space
  - ErgoPro Website Performance Agent    # Genie Space
  - ErgoPro Knowledge Assistant          # Knowledge Assistant endpoint
  - You.com Web Search                   # MCP Server


# ═══════════════════════════════════════════════════════════════════════════════
# BENCHMARK QUESTIONS
# (Add under Configure → Benchmarks to evaluate routing accuracy)
# ═══════════════════════════════════════════════════════════════════════════════

benchmarks:
  single_agent:
    - question: "Which warehouse has the lowest EP-900 stock?"
      expected_agent: Inventory Management Agent

    - question: "What is our average CSAT score for EP-200 issues?"
      expected_agent: Customer Support Agent

    - question: "Which promo type has the highest ROI for EP-500?"
      expected_agent: Pricing & Promotions Agent

    - question: "What is our on-time delivery rate for FedEx Freight?"
      expected_agent: Order Fulfillment Agent

    - question: "Which headline copy has the best CTR on social?"
      expected_agent: Marketing Copy Agent

    - question: "Where are users dropping off in the EP-900 checkout funnel?"
      expected_agent: Website Performance Agent

    - question: "What is the weight capacity of the EP-500?"
      expected_agent: Knowledge Assistant

    - question: "What are Herman Miller's latest pricing changes?"
      expected_agent: You.com Web Search

  multi_agent:
    - question: "Are we ready to launch the EP-900 next month?"
      expected_agents:
        - Inventory Management Agent
        - Order Fulfillment Agent
        - Pricing & Promotions Agent
        - Website Performance Agent
        - Knowledge Assistant

    - question: "Why is our EP-900 conversion rate lower than EP-200?"
      expected_agents:
        - Website Performance Agent
        - Pricing & Promotions Agent
        - Customer Support Agent

    - question: "Give me a full ErgoPro launch readiness report"
      expected_agents: all 9
