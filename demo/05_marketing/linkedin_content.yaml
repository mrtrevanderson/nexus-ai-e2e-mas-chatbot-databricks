# LINKEDIN POST — ARCHITECTURE DEEP DIVE (follow-up post)
# ═══════════════════════════════════════════════════════════════════════════════

post_architecture:
  hook: |
    The hardest part of building a multi-agent system isn't the agents.
    It's teaching the supervisor when to use which one. 🎯

  body: |
    A few things I learned building the ErgoPro supervisor on Databricks:

    1/ The Description field does the heavy lifting
    Agent Bricks splits "Description" (routing logic) from "Instructions"
    (response format). Most people underuse the Description. That's where
    you define your full agent roster, delegation triggers, and priority rules.
    Instructions should only cover tone and format.

    2/ Table comments are a multiplier for Genie accuracy
    Before configuring any Genie space, add SQL comments to every table.
    One line per table explaining what it contains and what the join keys are.
    Genie uses this metadata to generate dramatically better SQL.

    3/ Example SQL queries are the single biggest quality lever
    Each Genie space accepts up to 100 example queries. The more you add,
    the better Genie understands your data patterns. I added 5–10 per agent
    covering the most common question types — the improvement is significant.

    4/ Three layers of knowledge is the real power
    Structured data (Genie) + Unstructured docs (Knowledge Assistant) +
    Live web (You.com MCP) = a system that can answer questions no single
    source could answer alone.

    5/ Benchmark questions before you ship
    Agent Bricks lets you add benchmark questions with expected answers.
    Use them to validate routing accuracy before wiring the supervisor to
    a production app. It's the difference between a demo and a product.

    Full repo and configs are on my GitHub — link in the comments.

  hashtags: |
    #Databricks #AgentBricks #MultiAgent #RAG #KnowledgeAssistant
    #DataEngineering #AIArchitecture #MCP #GenieSql #EnterpriseAI


