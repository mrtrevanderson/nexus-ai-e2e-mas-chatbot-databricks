# AGENT 3 — PRICING & PROMOTIONS
# ═══════════════════════════════════════════════════════════════════════════════

name: ErgoPro Pricing & Promotions Agent
table: ius_unity_prod.sandbox.pricing_promotions

general_instructions: |
  You analyze promotional performance, price elasticity, ROI, and competitor
  price positioning for ErgoPro SKUs (EP-200, EP-500, EP-900).

  Key context:
  - base_price_usd is MSRP: EP-200=$349, EP-500=$649, EP-900=$999
  - MAP prices: EP-200=$299, EP-500=$549, EP-900=$849
  - price_index = promo_price / competitor_price (< 1.0 means we are cheaper)
  - elasticity_score: more negative = more price sensitive
  - Promo types: percent_off, fixed_off, bundle, bogo, flash
  - Channels: organic_search, paid_search, email, social, direct, affiliate
  - Never recommend discounts that would push price below MAP

example_sql_queries:
  - |
    -- Promo ROI by type and SKU
    SELECT promo_type, sku, product_name,
           COUNT(*) AS promos_run,
           ROUND(AVG(discount_pct), 1)   AS avg_discount_pct,
           ROUND(AVG(promo_roi_pct), 1)  AS avg_roi_pct,
           ROUND(AVG(margin_pct), 1)     AS avg_margin_pct,
           SUM(units_sold_promo)         AS total_units,
           ROUND(SUM(revenue_promo_usd), 2) AS total_revenue
    FROM ius_unity_prod.sandbox.pricing_promotions
    GROUP BY promo_type, sku, product_name
    ORDER BY avg_roi_pct DESC;

  - |
    -- Price index vs competitors by channel
    SELECT channel, sku,
           ROUND(AVG(base_price_usd), 2)       AS avg_msrp,
           ROUND(AVG(competitor_price_usd), 2) AS avg_competitor_price,
           ROUND(AVG(price_index), 3)           AS avg_price_index,
           ROUND(AVG(promo_price_usd), 2)       AS avg_promo_price
    FROM ius_unity_prod.sandbox.pricing_promotions
    GROUP BY channel, sku
    ORDER BY channel, sku;

  - |
    -- Elasticity by SKU — how price sensitive is each tier
    SELECT sku, product_name, tier,
           ROUND(AVG(elasticity_score), 2) AS avg_elasticity,
           ROUND(AVG(discount_pct), 1)     AS avg_discount_run,
           ROUND(AVG(promo_roi_pct), 1)    AS avg_roi_pct
    FROM ius_unity_prod.sandbox.pricing_promotions
    GROUP BY sku, product_name, tier
    ORDER BY avg_elasticity;

  - |
    -- Best performing promos by ROI (top 10)
    SELECT promo_id, sku, channel, promo_type,
           discount_pct, units_sold_promo,
           revenue_promo_usd, margin_pct, promo_roi_pct
    FROM ius_unity_prod.sandbox.pricing_promotions
    ORDER BY promo_roi_pct DESC
    LIMIT 10;

  - |
    -- Promo uplift: promo units vs baseline units
    SELECT sku, promo_type,
           ROUND(AVG(units_sold_promo), 0)    AS avg_promo_units,
           ROUND(AVG(units_sold_baseline), 0) AS avg_baseline_units,
           ROUND(AVG(units_sold_promo - units_sold_baseline), 0) AS avg_uplift
    FROM ius_unity_prod.sandbox.pricing_promotions
    GROUP BY sku, promo_type
    ORDER BY avg_uplift DESC;


