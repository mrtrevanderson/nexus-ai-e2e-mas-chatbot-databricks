# AGENT 5 — CUSTOMER SUPPORT
# ═══════════════════════════════════════════════════════════════════════════════

name: ErgoPro Customer Support Agent
table: ius_unity_prod.sandbox.customer_support

general_instructions: |
  You analyze support ticket trends, CSAT scores, resolution patterns,
  and escalation risk for ErgoPro chairs (EP-200, EP-500, EP-900).

  Key context:
  - Issue types: assembly_question, return_request, missing_part,
    warranty_claim, delivery_delay, product_defect, sizing_question,
    adjustment_help
  - Resolution types: resolved_first_contact, escalated_to_tier2,
    replacement_sent, refund_processed, knowledge_base_link, callback_scheduled
  - CSAT score: 1 (worst) to 5 (best) — target is 4.0+
  - sentiment_score: -1.0 (negative) to +1.0 (positive)
  - first_response_hrs and resolution_hrs are key SLA metrics
  - escalated = 'Yes' means ticket went to Tier 2

example_sql_queries:
  - |
    -- CSAT and resolution time by issue type
    SELECT issue_type,
           COUNT(*) AS tickets,
           ROUND(AVG(csat_score), 2)         AS avg_csat,
           ROUND(AVG(first_response_hrs), 1) AS avg_first_response_hrs,
           ROUND(AVG(resolution_hrs), 1)     AS avg_resolution_hrs,
           SUM(CASE WHEN escalated = 'Yes' THEN 1 ELSE 0 END) AS escalations
    FROM ius_unity_prod.sandbox.customer_support
    GROUP BY issue_type
    ORDER BY avg_csat ASC;

  - |
    -- Top issues by SKU
    SELECT sku, product_name, issue_type, COUNT(*) AS ticket_count,
           ROUND(AVG(csat_score), 2) AS avg_csat
    FROM ius_unity_prod.sandbox.customer_support
    GROUP BY sku, product_name, issue_type
    ORDER BY ticket_count DESC;

  - |
    -- Escalation rate and sentiment by SKU
    SELECT sku, product_name,
           COUNT(*) AS total_tickets,
           SUM(CASE WHEN escalated = 'Yes' THEN 1 ELSE 0 END) AS escalated,
           ROUND(SUM(CASE WHEN escalated = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS escalation_rate_pct,
           ROUND(AVG(sentiment_score), 3) AS avg_sentiment,
           ROUND(AVG(csat_score), 2)      AS avg_csat
    FROM ius_unity_prod.sandbox.customer_support
    GROUP BY sku, product_name
    ORDER BY escalation_rate_pct DESC;

  - |
    -- Repeat contact analysis
    SELECT sku, issue_type,
           SUM(CASE WHEN repeat_contact = 'Yes' THEN 1 ELSE 0 END) AS repeat_contacts,
           COUNT(*) AS total,
           ROUND(SUM(CASE WHEN repeat_contact = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS repeat_rate_pct
    FROM ius_unity_prod.sandbox.customer_support
    GROUP BY sku, issue_type
    ORDER BY repeat_rate_pct DESC;

  - |
    -- Regional support volume and CSAT
    SELECT region, COUNT(*) AS tickets,
           ROUND(AVG(csat_score), 2) AS avg_csat,
           ROUND(AVG(resolution_hrs), 1) AS avg_resolution_hrs
    FROM ius_unity_prod.sandbox.customer_support
    GROUP BY region
    ORDER BY tickets DESC;


