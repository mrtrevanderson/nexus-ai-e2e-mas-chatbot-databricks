# AGENT 6 — ORDER FULFILLMENT
# ═══════════════════════════════════════════════════════════════════════════════

name: ErgoPro Order Fulfillment Agent
table: ius_unity_prod.sandbox.order_fulfillment

general_instructions: |
  You track order volumes, carrier performance, on-time delivery, return rates,
  and regional fulfillment patterns for ErgoPro orders.

  Key context:
  - Carriers: UPS Ground (EP-200, EP-500), FedEx Freight (EP-900)
  - Warehouses: WH-LAX, WH-DFW, WH-ORD, WH-ATL, WH-JFK
  - on_time = 'Yes' means actual_delivery_date <= estimated_delivery_date
  - delivery_status values: delivered, in_transit, out_for_delivery,
    exception, returned
  - Packaging: flat_box, double_wall_box, pallet
  - return_initiated = 'Yes' means customer started a return

example_sql_queries:
  - |
    -- On-time delivery rate by carrier and SKU
    SELECT carrier, sku, product_name,
           COUNT(*) AS orders,
           SUM(CASE WHEN on_time = 'Yes' THEN 1 ELSE 0 END) AS on_time_count,
           ROUND(SUM(CASE WHEN on_time = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS on_time_pct,
           ROUND(AVG(shipping_cost_usd), 2) AS avg_shipping_cost
    FROM ius_unity_prod.sandbox.order_fulfillment
    GROUP BY carrier, sku, product_name
    ORDER BY on_time_pct ASC;

  - |
    -- Return rate by SKU and region
    SELECT sku, product_name, region,
           COUNT(*) AS orders,
           SUM(CASE WHEN return_initiated = 'Yes' THEN 1 ELSE 0 END) AS returns,
           ROUND(SUM(CASE WHEN return_initiated = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS return_rate_pct
    FROM ius_unity_prod.sandbox.order_fulfillment
    GROUP BY sku, product_name, region
    ORDER BY return_rate_pct DESC;

  - |
    -- Revenue and order volume by warehouse
    SELECT warehouse, sku,
           COUNT(*) AS orders,
           SUM(quantity) AS units_shipped,
           ROUND(SUM(order_total_usd), 2) AS total_revenue,
           ROUND(AVG(shipping_cost_usd), 2) AS avg_ship_cost
    FROM ius_unity_prod.sandbox.order_fulfillment
    GROUP BY warehouse, sku
    ORDER BY total_revenue DESC;

  - |
    -- Delivery exception and status breakdown
    SELECT delivery_status, sku, COUNT(*) AS count
    FROM ius_unity_prod.sandbox.order_fulfillment
    GROUP BY delivery_status, sku
    ORDER BY count DESC;

  - |
    -- Average order value and shipping cost by region and tier
    SELECT region, tier,
           COUNT(*) AS orders,
           ROUND(AVG(order_total_usd), 2)   AS avg_order_value,
           ROUND(AVG(shipping_cost_usd), 2) AS avg_shipping_cost,
           ROUND(AVG(shipping_cost_usd / order_total_usd * 100), 1) AS shipping_as_pct_of_order
    FROM ius_unity_prod.sandbox.order_fulfillment
    GROUP BY region, tier
    ORDER BY avg_order_value DESC;


# ═══════════════════════════════════════════════════════════════════════════════
# AGENT 7 — WEBSITE PERFORMANCE
# ═══════════════════════════════════════════════════════════════════════════════

name: ErgoPro Website Performance Agent
tables:
  - ius_unity_prod.sandbox.web_sessions
  - ius_unity_prod.sandbox.product_page_interactions
  - ius_unity_prod.sandbox.checkout_funnel
  - ius_unity_prod.sandbox.site_search_queries
  - ius_unity_prod.sandbox.campaign_attribution

general_instructions: |
  You analyze website behavioral data across sessions, product page engagement,
  checkout funnel, on-site search, and campaign attribution for ergochair.com.

  Key context:
  - Bounce = session where pages_viewed = 1
  - Conversion = sessions where conversions = 'Yes'
  - For revenue always use final_total_usd from checkout_funnel
    where completed_purchase = 'Yes' — never use cart_total_usd as revenue
  - ROAS = revenue_usd / cost_usd from campaign_attribution
  - Channels: organic_search, paid_search, email, social, direct, referral, affiliate
  - Devices: desktop, mobile, tablet
  - When comparing channels always show both session volume AND conversion rate

example_sql_queries:
  - |
    -- Conversion rate and bounce rate by channel
    SELECT channel,
           COUNT(*) AS sessions,
           ROUND(AVG(session_duration_sec), 0) AS avg_duration_sec,
           ROUND(SUM(CASE WHEN is_bounce = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS bounce_rate_pct,
           ROUND(SUM(CASE WHEN conversions = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 2) AS conversion_rate_pct
    FROM ius_unity_prod.sandbox.web_sessions
    GROUP BY channel
    ORDER BY conversion_rate_pct DESC;

  - |
    -- Checkout funnel drop-off by SKU
    SELECT sku, product_name, tier,
           COUNT(*) AS entered_cart,
           SUM(CASE WHEN reached_checkout  = 'Yes' THEN 1 ELSE 0 END) AS reached_checkout,
           SUM(CASE WHEN reached_payment   = 'Yes' THEN 1 ELSE 0 END) AS reached_payment,
           SUM(CASE WHEN completed_purchase = 'Yes' THEN 1 ELSE 0 END) AS completed,
           ROUND(SUM(CASE WHEN completed_purchase = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS purchase_rate_pct
    FROM ius_unity_prod.sandbox.checkout_funnel
    GROUP BY sku, product_name, tier
    ORDER BY purchase_rate_pct DESC;

  - |
    -- Top abandonment reasons by stage
    SELECT abandonment_stage, abandonment_reason, sku,
           COUNT(*) AS abandoned_sessions
    FROM ius_unity_prod.sandbox.checkout_funnel
    WHERE completed_purchase = 'No' AND abandonment_reason != ''
    GROUP BY abandonment_stage, abandonment_reason, sku
    ORDER BY abandoned_sessions DESC;

  - |
    -- Campaign ROAS by channel and campaign
    SELECT channel, utm_campaign,
           COUNT(*) AS sessions,
           ROUND(SUM(revenue_usd), 2) AS total_revenue,
           ROUND(SUM(cost_usd), 2)    AS total_cost,
           ROUND(SUM(revenue_usd) / NULLIF(SUM(cost_usd), 0), 2) AS roas,
           ROUND(AVG(ctr_pct), 2)     AS avg_ctr_pct
    FROM ius_unity_prod.sandbox.campaign_attribution
    WHERE cost_usd > 0
    GROUP BY channel, utm_campaign
    ORDER BY roas DESC;

  - |
    -- Zero result searches — content gaps
    SELECT query, COUNT(*) AS searches,
           SUM(CASE WHEN zero_results = 'Yes' THEN 1 ELSE 0 END) AS zero_result_count,
           ROUND(SUM(CASE WHEN zero_results = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS zero_result_rate_pct
    FROM ius_unity_prod.sandbox.site_search_queries
    GROUP BY query
    HAVING zero_result_count > 0
    ORDER BY zero_result_count DESC;

  - |
    -- Product page engagement by SKU and device
    SELECT sku, product_name, device_type,
           COUNT(*) AS page_views,
           ROUND(AVG(scroll_depth_pct), 1)   AS avg_scroll_pct,
           ROUND(AVG(time_on_page_sec), 0)   AS avg_time_on_page_sec,
           ROUND(SUM(CASE WHEN added_to_cart = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS add_to_cart_rate_pct
    FROM ius_unity_prod.sandbox.product_page_interactions
    GROUP BY sku, product_name, device_type
    ORDER BY sku, device_type;

  - |
    -- Promo code performance
    SELECT promo_code_applied, sku,
           COUNT(*) AS uses,
           ROUND(AVG(discount_usd), 2) AS avg_discount,
           SUM(CASE WHEN completed_purchase = 'Yes' THEN 1 ELSE 0 END) AS purchases,
           ROUND(SUM(CASE WHEN completed_purchase = 'Yes' THEN final_total_usd ELSE 0 END), 2) AS revenue
    FROM ius_unity_prod.sandbox.checkout_funnel
    WHERE promo_code_applied != ''
    GROUP BY promo_code_applied, sku
    ORDER BY purchases DESC;

  - |
    -- New vs returning visitor behavior by channel
    SELECT is_new_user, channel,
           COUNT(*) AS sessions,
           ROUND(AVG(pages_viewed), 1)        AS avg_pages,
           ROUND(AVG(session_duration_sec), 0) AS avg_duration_sec,
           ROUND(SUM(CASE WHEN conversions = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 2) AS conversion_rate_pct
    FROM ius_unity_prod.sandbox.web_sessions
    GROUP BY is_new_user, channel
    ORDER BY is_new_user, conversion_rate_pct DESC;

  - |
    -- Revenue and sessions by region and device
    SELECT s.region, s.device_type,
           COUNT(DISTINCT s.session_id) AS sessions,
           SUM(CASE WHEN f.completed_purchase = 'Yes' THEN 1 ELSE 0 END) AS purchases,
           ROUND(SUM(CASE WHEN f.completed_purchase = 'Yes' THEN f.final_total_usd ELSE 0 END), 2) AS total_revenue
    FROM ius_unity_prod.sandbox.web_sessions s
    LEFT JOIN ius_unity_prod.sandbox.checkout_funnel f ON s.session_id = f.session_id
    GROUP BY s.region, s.device_type
    ORDER BY total_revenue DESC;

  - |
    -- Search queries that lead to purchase
    SELECT query,
           COUNT(*) AS searches,
           SUM(CASE WHEN led_to_purchase = 'Yes' THEN 1 ELSE 0 END) AS led_to_purchase,
           ROUND(SUM(CASE WHEN led_to_purchase = 'Yes' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS purchase_rate_pct
    FROM ius_unity_prod.sandbox.site_search_queries
    GROUP BY query
    ORDER BY led_to_purchase DESC
    LIMIT 15;


