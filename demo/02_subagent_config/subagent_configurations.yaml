# ErgoPro Subagent Configurations
# All agents live in: ius_unity_prod.sandbox
# Create each via: Databricks → Genie → New (for Genie spaces)
#                  Databricks → Agents → Knowledge Assistant (for KA)

# ═══════════════════════════════════════════════════════════════════════════════
# AGENT 1 — PRODUCT RESEARCH
# ═══════════════════════════════════════════════════════════════════════════════

name: ErgoPro Product Research Agent
table: ius_unity_prod.sandbox.product_research

general_instructions: |
  You analyze competitor products, market trends, pricing bands, ratings,
  and feature gaps for the ErgoPro chair line.

  Key context:
  - ErgoPro SKUs: EP-200 (Entry $349), EP-500 (Mid $649), EP-900 (Premium $999)
  - Competitor set: Herman Miller, Steelcase, Branch, Autonomous, Humanscale
  - Market segments: budget, mid-market, premium, luxury
  - Categories: ergonomic, executive, gaming, task, kneeling, saddle
  - yoy_sales_growth_pct is year-over-year category growth for that brand/product
  - Always segment results by market_segment or category when comparing

example_sql_queries:
  - |
    -- Average competitor price by market segment
    SELECT market_segment,
           ROUND(AVG(msrp_usd), 2)      AS avg_msrp,
           ROUND(AVG(sale_price_usd), 2) AS avg_sale_price,
           ROUND(AVG(rating_avg), 2)     AS avg_rating,
           COUNT(*)                      AS products
    FROM ius_unity_prod.sandbox.product_research
    GROUP BY market_segment
    ORDER BY avg_msrp DESC;

  - |
    -- Top rated competitors with highest review volume
    SELECT competitor_brand, product_name, msrp_usd,
           rating_avg, review_count, key_feature_1, warranty_years
    FROM ius_unity_prod.sandbox.product_research
    WHERE rating_avg >= 4.5
    ORDER BY review_count DESC
    LIMIT 10;

  - |
    -- Fastest growing brands by YoY sales growth
    SELECT competitor_brand,
           ROUND(AVG(yoy_sales_growth_pct), 1) AS avg_growth_pct,
           COUNT(*) AS products_tracked
    FROM ius_unity_prod.sandbox.product_research
    GROUP BY competitor_brand
    ORDER BY avg_growth_pct DESC;

  - |
    -- Feature frequency analysis — what features appear most
    SELECT feature, COUNT(*) AS frequency
    FROM (
      SELECT key_feature_1 AS feature FROM ius_unity_prod.sandbox.product_research
      UNION ALL
      SELECT key_feature_2 FROM ius_unity_prod.sandbox.product_research
      UNION ALL
      SELECT key_feature_3 FROM ius_unity_prod.sandbox.product_research
    )
    GROUP BY feature
    ORDER BY frequency DESC;

  - |
    -- Price gap analysis by category vs ErgoPro MSRP
    SELECT category,
           ROUND(AVG(msrp_usd), 2) AS avg_competitor_msrp,
           ROUND(MIN(msrp_usd), 2) AS min_competitor_price,
           ROUND(MAX(msrp_usd), 2) AS max_competitor_price,
           SUM(CASE WHEN in_stock = 'Yes' THEN 1 ELSE 0 END) AS in_stock_count
    FROM ius_unity_prod.sandbox.product_research
    GROUP BY category
    ORDER BY avg_competitor_msrp;


# ═══════════════════════════════════════════════════════════════════════════════
# AGENT 2 — INVENTORY MANAGEMENT
# ═══════════════════════════════════════════════════════════════════════════════

name: ErgoPro Inventory Management Agent
table: ius_unity_prod.sandbox.inventory_management

general_instructions: |
  You manage stock levels, reorder points, warehouse locations, and supply
  forecasts for ErgoPro chairs (EP-200, EP-500, EP-900).

  Key context:
  - Warehouses: WH-LAX (Los Angeles), WH-DFW (Dallas), WH-ORD (Chicago),
    WH-ATL (Atlanta), WH-JFK (New York)
  - SKUs: EP-200 (Entry), EP-500 (Mid), EP-900 (Premium)
  - weeks_of_supply = units_available / (avg_daily_velocity * 7)
  - Units below reorder_point require immediate replenishment action
  - carrying_cost_pct is the annual cost to hold inventory as % of unit cost
  - Always flag SKUs where weeks_of_supply < 4 as at-risk for stockout

example_sql_queries:
  - |
    -- Current stock summary by SKU across all warehouses
    SELECT sku, product_name, tier,
           SUM(units_on_hand)   AS total_on_hand,
           SUM(units_reserved)  AS total_reserved,
           SUM(units_available) AS total_available,
           ROUND(AVG(weeks_of_supply), 1) AS avg_weeks_supply,
           ROUND(AVG(avg_daily_velocity), 2) AS avg_daily_velocity
    FROM ius_unity_prod.sandbox.inventory_management
    GROUP BY sku, product_name, tier
    ORDER BY sku;

  - |
    -- At-risk SKUs where available stock is below reorder point
    SELECT sku, product_name, warehouse,
           units_available, reorder_point, reorder_qty,
           lead_time_days, weeks_of_supply
    FROM ius_unity_prod.sandbox.inventory_management
    WHERE units_available < reorder_point
    ORDER BY units_available ASC;

  - |
    -- Inventory health by warehouse
    SELECT warehouse,
           COUNT(DISTINCT sku) AS skus_stocked,
           SUM(units_available) AS total_available,
           ROUND(AVG(weeks_of_supply), 1) AS avg_weeks_supply,
           SUM(CASE WHEN units_available < reorder_point THEN 1 ELSE 0 END) AS below_reorder
    FROM ius_unity_prod.sandbox.inventory_management
    GROUP BY warehouse
    ORDER BY total_available DESC;

  - |
    -- Carrying cost exposure by SKU
    SELECT sku, product_name,
           SUM(units_on_hand) AS units,
           ROUND(AVG(unit_cost_usd), 2) AS avg_unit_cost,
           ROUND(SUM(units_on_hand * unit_cost_usd), 2) AS total_inventory_value,
           ROUND(AVG(carrying_cost_pct), 1) AS avg_carrying_cost_pct
    FROM ius_unity_prod.sandbox.inventory_management
    GROUP BY sku, product_name
    ORDER BY total_inventory_value DESC;

  - |
    -- Days since last received by warehouse and SKU
    SELECT sku, warehouse, last_received_date, last_sold_date,
           units_available, avg_daily_velocity, weeks_of_supply
    FROM ius_unity_prod.sandbox.inventory_management
    ORDER BY last_received_date ASC;


