# AGENT 4 — MARKETING COPY
# ═══════════════════════════════════════════════════════════════════════════════

name: ErgoPro Marketing Copy Agent
table: ius_unity_prod.sandbox.marketing_copy

general_instructions: |
  You evaluate marketing copy performance across formats, channels, tones,
  and SKUs for the ErgoPro chair line. Use CTR, CVR, and engagement score
  as primary quality metrics.

  Key context:
  - Copy formats: product_title, bullet_feature, short_description,
    ad_headline, email_subject, meta_description, social_caption, banner_copy
  - Tones: professional, casual, aspirational, technical, friendly, authoritative
  - Channels: organic_search, paid_search, email, social, direct, affiliate
  - engagement_score = CTR * CVR * variance_factor (higher is better)
  - A/B variants: A, B, C — compare within same format and channel
  - approved field: Yes = live, No = rejected, Pending = awaiting review

example_sql_queries:
  - |
    -- Top performing copy by CTR per format
    SELECT copy_format, tone, channel,
           ROUND(AVG(click_through_rate_pct), 2) AS avg_ctr,
           ROUND(AVG(conversion_rate_pct), 2)    AS avg_cvr,
           ROUND(AVG(engagement_score), 2)        AS avg_engagement,
           COUNT(*) AS assets
    FROM ius_unity_prod.sandbox.marketing_copy
    WHERE approved = 'Yes'
    GROUP BY copy_format, tone, channel
    ORDER BY avg_ctr DESC;

  - |
    -- A/B variant comparison by format and SKU
    SELECT sku, copy_format, ab_variant,
           COUNT(*) AS assets,
           ROUND(AVG(click_through_rate_pct), 2) AS avg_ctr,
           ROUND(AVG(conversion_rate_pct), 2)    AS avg_cvr
    FROM ius_unity_prod.sandbox.marketing_copy
    GROUP BY sku, copy_format, ab_variant
    ORDER BY sku, copy_format, avg_ctr DESC;

  - |
    -- Copy approval status summary
    SELECT sku, product_name, approved, COUNT(*) AS asset_count
    FROM ius_unity_prod.sandbox.marketing_copy
    GROUP BY sku, product_name, approved
    ORDER BY sku, approved;

  - |
    -- Best tone by channel
    SELECT channel, tone,
           ROUND(AVG(click_through_rate_pct), 2) AS avg_ctr,
           ROUND(AVG(conversion_rate_pct), 2)    AS avg_cvr,
           COUNT(*) AS assets
    FROM ius_unity_prod.sandbox.marketing_copy
    WHERE approved = 'Yes'
    GROUP BY channel, tone
    ORDER BY channel, avg_ctr DESC;

  - |
    -- Pending review assets by reviewer
    SELECT reviewed_by, COUNT(*) AS pending_count,
           GROUP_CONCAT(DISTINCT sku) AS skus_pending
    FROM ius_unity_prod.sandbox.marketing_copy
    WHERE approved = 'Pending'
    GROUP BY reviewed_by
    ORDER BY pending_count DESC;


