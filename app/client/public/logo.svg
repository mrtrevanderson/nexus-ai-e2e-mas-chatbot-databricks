<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <!-- Chair back -->
  <rect x="6" y="2" width="22" height="18" rx="3.5" fill="#2563EB"/>
  <!-- Chair seat -->
  <rect x="3" y="22" width="28" height="8" rx="3.5" fill="#2563EB"/>
  <!-- Armrests -->
  <rect x="0" y="19" width="5" height="11" rx="2.5" fill="#3B82F6"/>
  <rect x="29" y="19" width="5" height="11" rx="2.5" fill="#3B82F6"/>
  <!-- Center pole -->
  <rect x="14.5" y="30" width="5" height="9" fill="#1D4ED8"/>
  <!-- 5-star base -->
  <line x1="17" y1="39" x2="4"  y2="47" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <line x1="17" y1="39" x2="30" y2="47" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <line x1="17" y1="39" x2="17" y2="48" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <line x1="17" y1="39" x2="7"  y2="44" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <line x1="17" y1="39" x2="27" y2="44" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <!-- Wheels -->
  <circle cx="4"  cy="47" r="2.2" fill="#1E3A8A"/>
  <circle cx="30" cy="47" r="2.2" fill="#1E3A8A"/>
  <circle cx="17" cy="48" r="2.2" fill="#1E3A8A"/>
  <circle cx="7"  cy="44" r="2.2" fill="#1E3A8A"/>
  <circle cx="27" cy="44" r="2.2" fill="#1E3A8A"/>
  <!-- Lumbar support accent -->
  <rect x="10" y="12" width="14" height="3" rx="1.5" fill="#93C5FD"/>

  <!-- Brand name -->
  <text x="46" y="22" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#111827">Ergo</text>
  <text x="96" y="22" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#2563EB">Pro</text>
  <!-- Tagline -->
  <text x="47" y="38" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="500" fill="#6B7280" letter-spacing="2">SUPPORT ASSISTANT</text>
</svg>
